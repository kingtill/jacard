<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CardForge{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --surface:  #111111;
      --border:   #242424;
      --gold:     #c9a962;
      --gold-dim: #8a7140;
      --text:     #e8e2d8;
      --muted:    #6b6560;
      --danger:   #c0392b;
      --radius:   6px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-decoration: none;
    }
    .nav-brand span { font-style: italic; color: var(--text); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--text);
    }
    .btn-gold {
      background: var(--gold);
      border-color: var(--gold);
      color: #080808;
    }
    .btn-gold:hover { background: #e0be78; border-color: #e0be78; }
    .btn:not(.btn-gold):hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 0.35rem 0.85rem; font-size: 0.75rem; }

    /* ── Container ── */
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .page-header h1 span { color: var(--gold); font-style: italic; }

    /* ── Forms ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-full { grid-column: 1 / -1; }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field input, .field textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      transition: border-color 0.2s;
      width: 100%;
    }
    .field input:focus, .field textarea:focus {
      outline: none;
      border-color: var(--gold-dim);
    }
    .field input::placeholder { color: var(--muted); }

    /* ── Section divider ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin: 2rem 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Flash messages ── */
    .flash { padding: 0.7rem 1rem; border-radius: var(--radius); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .flash-success { background: #1a2e1a; border: 1px solid #2d5a2d; color: #7bc87b; }
    .flash-error   { background: #2e1a1a; border: 1px solid #5a2d2d; color: #c87b7b; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeUp 0.45s ease both; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}" class="nav-brand">Card<span>Forge</span></a>
    <a href="{{ url_for('new_card') }}" class="btn btn-gold">+ New Card</a>
  </nav>
  <div class="container animate-in">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
